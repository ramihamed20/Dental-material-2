<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dental Materials Quiz — خواص مواد</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
  <style>
/* ═══════════════════════════════════════════
   DENTAL QUIZ — STYLES
   Theme: Dark Clinical / Surgical precision
═══════════════════════════════════════════ */

/* ── Fonts ────────────────────────────────── */
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@300;400;600;700;800&display=swap');

/* ── Variables ────────────────────────────── */
:root {
  --bg:        #080c14;
  --surface:   #0e1420;
  --surface2:  #141b2b;
  --border:    rgba(255,255,255,0.07);
  --border2:   rgba(255,255,255,0.12);

  --text:      #edf2ff;
  --muted:     #6b7a99;
  --subtle:    #2a3352;

  --accent:    #4f9eff;
  --accent2:   #7ec8e3;
  --teal:      #00d4aa;

  --correct:   #22c55e;
  --wrong:     #ef4444;
  --warn:      #f59e0b;

  --glow-a:    rgba(79, 158, 255, 0.18);
  --glow-t:    rgba(0, 212, 170, 0.12);

  --radius:    16px;
  --radius-sm: 10px;
  --radius-lg: 24px;

  --font-head: 'Sora', sans-serif;
  --font-mono: 'DM Mono', monospace;
  --font-body: 'Sora', sans-serif;

  --transition: 0.22s cubic-bezier(0.4, 0, 0.2, 1);
  --spring:     0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
}

/* ── Reset ────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; -webkit-tap-highlight-color: transparent; }

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ── Background ───────────────────────────── */
.bg-mesh {
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 80% 50% at 20% 20%, rgba(79,158,255,0.07) 0%, transparent 60%),
    radial-gradient(ellipse 60% 60% at 80% 80%, rgba(0,212,170,0.05) 0%, transparent 60%);
}

.bg-glow {
  position: fixed; z-index: 0; border-radius: 50%;
  filter: blur(100px); pointer-events: none;
}
.g1 {
  width: 600px; height: 600px;
  top: -150px; left: -150px;
  background: radial-gradient(circle, rgba(79,158,255,0.12) 0%, transparent 70%);
  animation: floatA 12s ease-in-out infinite;
}
.g2 {
  width: 500px; height: 500px;
  bottom: -100px; right: -100px;
  background: radial-gradient(circle, rgba(0,212,170,0.1) 0%, transparent 70%);
  animation: floatB 15s ease-in-out infinite;
}

@keyframes floatA {
  0%,100% { transform: translate(0,0); }
  50% { transform: translate(40px, 30px); }
}
@keyframes floatB {
  0%,100% { transform: translate(0,0); }
  50% { transform: translate(-30px, -40px); }
}

.bg-noise {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  opacity: 0.4;
}

/* ── Screens ──────────────────────────────── */
.screen {
  display: none;
  position: relative;
  z-index: 1;
  min-height: 100dvh;
}
.screen.active { display: flex; }

/* ═══════════════════════════════════════════
   START SCREEN
═══════════════════════════════════════════ */
#startScreen {
  align-items: center;
  justify-content: center;
  padding: 24px;
}

.start-card {
  width: 100%;
  max-width: 480px;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--radius-lg);
  padding: 48px 40px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 28px;
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.03),
    0 40px 80px rgba(0,0,0,0.5),
    0 0 60px rgba(79,158,255,0.06);
  animation: cardIn 0.6s var(--spring) both;
}

@keyframes cardIn {
  from { opacity: 0; transform: translateY(30px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

/* Brand icon */
.brand {
  position: relative;
  width: 72px; height: 72px;
  display: flex; align-items: center; justify-content: center;
}
.brand-icon {
  width: 64px; height: 64px;
  background: linear-gradient(135deg, rgba(79,158,255,0.15), rgba(0,212,170,0.15));
  border: 1px solid rgba(79,158,255,0.3);
  border-radius: 20px;
  display: flex; align-items: center; justify-content: center;
  color: var(--accent);
  font-size: 28px;
}
.brand-icon svg { width: 34px; height: 34px; }
.brand-pulse {
  position: absolute; inset: -8px;
  border-radius: 28px;
  border: 1px solid rgba(79,158,255,0.2);
  animation: pulse 2.5s ease-in-out infinite;
}
@keyframes pulse {
  0%,100% { opacity: 0.5; transform: scale(1); }
  50% { opacity: 0; transform: scale(1.15); }
}

/* Title */
.start-text { text-align: center; }
.start-text h1 {
  font-family: var(--font-head);
  font-size: clamp(1.6rem, 5vw, 2.1rem);
  font-weight: 700;
  line-height: 1.2;
  letter-spacing: -0.02em;
}
.gradient-text {
  background: linear-gradient(90deg, var(--accent), var(--teal));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.arabic-sub {
  margin-top: 8px;
  font-size: 0.85rem;
  color: var(--muted);
  letter-spacing: 0.01em;
  direction: rtl;
}

/* Stats row */
.stats-row {
  display: flex;
  align-items: center;
  gap: 0;
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  overflow: hidden;
}
.stat {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 14px 8px;
  gap: 2px;
}
.stat-n {
  font-family: var(--font-mono);
  font-size: 1.4rem;
  font-weight: 500;
  color: var(--accent);
}
.stat-l {
  font-size: 0.7rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}
.stat-sep {
  width: 1px;
  height: 40px;
  background: var(--border);
}

/* Options */
.options-panel {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.toggle-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: border-color var(--transition);
  user-select: none;
}
.toggle-row:hover { border-color: var(--border2); }
.toggle-info {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 0.84rem;
  color: var(--muted);
}
.toggle-info svg { width: 14px; height: 14px; color: var(--accent); flex-shrink: 0; }

/* Toggle switch */
.toggle { position: relative; }
.toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
.toggle-track {
  display: block;
  width: 42px; height: 24px;
  background: var(--subtle);
  border-radius: 12px;
  position: relative;
  transition: background var(--transition);
  cursor: pointer;
}
.toggle-thumb {
  position: absolute;
  top: 3px; left: 3px;
  width: 18px; height: 18px;
  background: white;
  border-radius: 50%;
  transition: transform var(--transition);
  box-shadow: 0 1px 4px rgba(0,0,0,0.3);
}
.toggle input:checked + .toggle-track { background: var(--accent); }
.toggle input:checked + .toggle-track .toggle-thumb { transform: translateX(18px); }

/* Start button */
.btn-start {
  width: 100%;
  padding: 16px 24px;
  background: linear-gradient(135deg, var(--accent), #3b8de8);
  border: none;
  border-radius: var(--radius-sm);
  color: white;
  font-family: var(--font-head);
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  transition: transform var(--transition), box-shadow var(--transition), filter var(--transition);
  box-shadow: 0 4px 24px rgba(79,158,255,0.35);
  letter-spacing: 0.01em;
}
.btn-start svg { width: 18px; height: 18px; }
.btn-start:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 32px rgba(79,158,255,0.45);
  filter: brightness(1.05);
}
.btn-start:active { transform: translateY(0); }

/* Keyboard hints */
.kbd-hints {
  font-size: 0.75rem;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 4px;
  flex-wrap: wrap;
  justify-content: center;
}
kbd {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 5px;
  padding: 2px 7px;
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--text);
}

/* ═══════════════════════════════════════════
   QUIZ SCREEN
═══════════════════════════════════════════ */
#quizScreen {
  flex-direction: column;
  align-items: stretch;
}

/* Header */
.quiz-header {
  position: sticky;
  top: 0;
  z-index: 10;
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 12px 20px;
  background: rgba(8, 12, 20, 0.85);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}

.btn-icon {
  width: 38px; height: 38px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  color: var(--muted);
  transition: color var(--transition), border-color var(--transition), background var(--transition);
  flex-shrink: 0;
}
.btn-icon svg { width: 16px; height: 16px; }
.btn-icon:hover { color: var(--wrong); border-color: var(--wrong); background: rgba(239,68,68,0.1); }

.progress-block {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.progress-bar {
  height: 6px;
  background: var(--subtle);
  border-radius: 3px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--teal));
  border-radius: 3px;
  transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: 0 0 8px rgba(79,158,255,0.5);
}
.progress-label {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--muted);
}

.score-chip {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 6px 12px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 20px;
  font-family: var(--font-mono);
  font-size: 0.85rem;
  color: var(--warn);
  transition: transform var(--spring);
}
.score-chip svg { color: var(--warn); }
.score-chip.bump { animation: bump 0.3s var(--spring); }
@keyframes bump {
  0%,100% { transform: scale(1); }
  50% { transform: scale(1.2); }
}

/* Quiz body */
.quiz-body {
  flex: 1;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 24px 16px;
}

.quiz-card {
  width: 100%;
  max-width: 600px;
  display: flex;
  flex-direction: column;
  gap: 18px;
  animation: slideIn 0.35s var(--spring) both;
}

@keyframes slideIn {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Slide area */
.slide-area {
  position: relative;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  overflow: hidden;
  aspect-ratio: 4/3;
  display: flex;
  align-items: center;
  justify-content: center;
}

.slide-number {
  position: absolute;
  top: 12px; left: 12px;
  z-index: 2;
  background: rgba(8,12,20,0.8);
  backdrop-filter: blur(8px);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 4px 10px;
  font-family: var(--font-mono);
  font-size: 0.72rem;
  color: var(--accent);
  letter-spacing: 0.05em;
}

.slide-img {
  width: 100%; height: 100%;
  object-fit: contain;
  transition: opacity 0.3s ease;
  display: block;
}
.slide-img.loading { opacity: 0; }

.slide-loader {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  color: var(--muted);
  font-size: 0.8rem;
  background: var(--surface);
  z-index: 1;
}
.slide-loader.hidden { display: none; }

.spinner {
  width: 28px; height: 28px;
  border: 2px solid var(--border2);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.slide-error {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  color: var(--muted);
  font-size: 0.8rem;
  background: var(--surface);
}
.slide-error svg { width: 32px; height: 32px; color: var(--wrong); opacity: 0.5; }
.hidden { display: none !important; }

/* Question label */
.question-label {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 0.9rem;
  color: var(--muted);
  padding: 0 4px;
}
.q-icon { font-size: 1rem; }

/* Choices */
.choices {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.choice-btn {
  width: 100%;
  padding: 15px 18px;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-family: var(--font-body);
  font-size: 0.9rem;
  text-align: left;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 14px;
  transition:
    background var(--transition),
    border-color var(--transition),
    transform var(--transition),
    box-shadow var(--transition);
  position: relative;
  overflow: hidden;
}
.choice-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  opacity: 0;
  transition: opacity var(--transition);
  background: linear-gradient(90deg, rgba(79,158,255,0.08), transparent);
}
.choice-btn:hover:not(:disabled) {
  border-color: rgba(79,158,255,0.4);
  background: var(--surface2);
  transform: translateX(4px);
}
.choice-btn:hover:not(:disabled)::before { opacity: 1; }
.choice-btn:disabled { cursor: default; }

.choice-letter {
  width: 30px; height: 30px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-mono);
  font-size: 0.78rem;
  font-weight: 500;
  color: var(--accent);
  flex-shrink: 0;
  transition: all var(--transition);
}

.choice-text { flex: 1; line-height: 1.4; }

.choice-icon {
  width: 22px; height: 22px;
  flex-shrink: 0;
  display: none;
}

/* Correct state */
.choice-btn.correct {
  background: rgba(34,197,94,0.12);
  border-color: var(--correct);
  animation: correctPop 0.4s var(--spring);
}
.choice-btn.correct .choice-letter {
  background: var(--correct);
  border-color: var(--correct);
  color: white;
}
.choice-btn.correct .choice-icon { display: block; color: var(--correct); }

/* Wrong state */
.choice-btn.wrong {
  background: rgba(239,68,68,0.1);
  border-color: var(--wrong);
  animation: wrongShake 0.4s ease;
}
.choice-btn.wrong .choice-letter {
  background: var(--wrong);
  border-color: var(--wrong);
  color: white;
}
.choice-btn.wrong .choice-icon { display: block; color: var(--wrong); }

/* Dimmed state */
.choice-btn.dimmed {
  opacity: 0.35;
  transform: none !important;
}

@keyframes correctPop {
  0% { transform: scale(1); }
  40% { transform: scale(1.02) translateX(4px); }
  100% { transform: scale(1) translateX(4px); }
}
@keyframes wrongShake {
  0%,100% { transform: translateX(0); }
  20% { transform: translateX(-6px); }
  40% { transform: translateX(6px); }
  60% { transform: translateX(-4px); }
  80% { transform: translateX(4px); }
}

/* Feedback */
.feedback {
  border-radius: var(--radius-sm);
  overflow: hidden;
  animation: feedIn 0.3s var(--spring);
}
@keyframes feedIn {
  from { opacity: 0; transform: translateY(-8px); }
  to   { opacity: 1; transform: translateY(0); }
}
.feedback-inner {
  padding: 14px 18px;
  font-size: 0.88rem;
  line-height: 1.5;
  font-weight: 500;
}
.feedback.correct-fb {
  background: rgba(34,197,94,0.12);
  border: 1px solid rgba(34,197,94,0.3);
}
.feedback.correct-fb .feedback-inner { color: var(--correct); }
.feedback.wrong-fb {
  background: rgba(239,68,68,0.1);
  border: 1px solid rgba(239,68,68,0.3);
}
.feedback.wrong-fb .feedback-inner { color: #fca5a5; }

/* Footer / Next */
.quiz-footer {
  padding: 16px 20px;
  border-top: 1px solid var(--border);
  background: rgba(8,12,20,0.85);
  backdrop-filter: blur(20px);
}

.btn-next {
  width: 100%;
  max-width: 600px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 15px 24px;
  background: linear-gradient(135deg, var(--accent), #3b8de8);
  border: none;
  border-radius: var(--radius-sm);
  color: white;
  font-family: var(--font-head);
  font-size: 0.95rem;
  font-weight: 600;
  cursor: pointer;
  transition: transform var(--transition), box-shadow var(--transition), opacity var(--transition), filter var(--transition);
  box-shadow: 0 4px 20px rgba(79,158,255,0.3);
}
.btn-next svg { width: 18px; height: 18px; }
.btn-next:disabled {
  opacity: 0.35;
  cursor: not-allowed;
  box-shadow: none;
  filter: none;
}
.btn-next:not(:disabled):hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 28px rgba(79,158,255,0.45);
  filter: brightness(1.05);
}
.btn-next:not(:disabled):active { transform: translateY(0); }

/* ═══════════════════════════════════════════
   RESULT SCREEN
═══════════════════════════════════════════ */
#resultScreen {
  align-items: center;
  justify-content: center;
  padding: 24px;
}

.result-card {
  width: 100%;
  max-width: 440px;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--radius-lg);
  padding: 48px 36px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 18px;
  box-shadow: 0 40px 80px rgba(0,0,0,0.5);
  animation: cardIn 0.5s var(--spring) both;
}

.result-trophy {
  font-size: 3.5rem;
  animation: trophyBounce 0.6s var(--spring) 0.2s both;
}
@keyframes trophyBounce {
  from { transform: scale(0) rotate(-20deg); opacity: 0; }
  to   { transform: scale(1) rotate(0deg); opacity: 1; }
}

.result-title {
  font-family: var(--font-head);
  font-size: 1.5rem;
  font-weight: 700;
  letter-spacing: -0.02em;
}

.result-big {
  font-family: var(--font-mono);
  font-size: 2.5rem;
  font-weight: 500;
  color: var(--accent);
  letter-spacing: -0.02em;
}

.result-pct {
  font-family: var(--font-mono);
  font-size: 1rem;
  color: var(--muted);
  margin-top: -10px;
}

.grade-badge {
  padding: 8px 24px;
  border-radius: 20px;
  border: 1px solid var(--border2);
  font-family: var(--font-mono);
  font-size: 0.85rem;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
.grade-badge.a { background: rgba(34,197,94,0.15); border-color: rgba(34,197,94,0.4); color: var(--correct); }
.grade-badge.b { background: rgba(79,158,255,0.15); border-color: rgba(79,158,255,0.4); color: var(--accent); }
.grade-badge.c { background: rgba(245,158,11,0.15); border-color: rgba(245,158,11,0.4); color: var(--warn); }
.grade-badge.d { background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.3); color: var(--wrong); }

.result-breakdown {
  display: flex;
  gap: 0;
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  overflow: hidden;
}
.rb-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 16px 8px;
  gap: 4px;
  border-right: 1px solid var(--border);
}
.rb-item:last-child { border-right: none; }
.rb-n {
  font-family: var(--font-mono);
  font-size: 1.4rem;
  font-weight: 500;
}
.rb-correct .rb-n { color: var(--correct); }
.rb-wrong   .rb-n { color: var(--wrong); }
.rb-best    .rb-n { color: var(--warn); }
.rb-l {
  font-size: 0.68rem;
  color: var(--muted);
  text-align: center;
}

.result-actions {
  display: flex;
  gap: 10px;
  width: 100%;
}
.btn-outline {
  flex: 1;
  padding: 14px 16px;
  background: transparent;
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-family: var(--font-head);
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: background var(--transition), border-color var(--transition);
}
.btn-outline svg { width: 16px; height: 16px; }
.btn-outline:hover { background: var(--surface2); border-color: var(--accent); }
.result-actions .btn-start { flex: 1.5; }
.result-actions .btn-start svg { width: 16px; height: 16px; }

/* ═══════════════════════════════════════════
   TRANSITIONS
═══════════════════════════════════════════ */
.screen-exit {
  animation: screenOut 0.25s ease forwards;
}
@keyframes screenOut {
  to { opacity: 0; transform: translateY(-12px); }
}
.screen-enter {
  animation: screenEnter 0.35s var(--spring) forwards;
}
@keyframes screenEnter {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ═══════════════════════════════════════════
   RESPONSIVE
═══════════════════════════════════════════ */
@media (max-width: 480px) {
  .start-card { padding: 36px 24px; }
  .result-card { padding: 36px 24px; }
  .quiz-body { padding: 16px 12px; }
  .choice-btn { padding: 12px 14px; font-size: 0.85rem; }
  .btn-next { font-size: 0.88rem; }
}

@media (max-width: 360px) {
  .start-card { padding: 28px 18px; gap: 20px; }
  .start-text h1 { font-size: 1.4rem; }
}

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--subtle); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--muted); }

/* Flat pool of all terms for fallback */
const ALL_TERMS = Object.values(DENTAL_BANK).flatMap(c => c.terms);

/* ──────────────────────────────────────────────────────
   2. SMART DISTRACTOR GENERATOR
────────────────────────────────────────────────────── */

/**
 * Returns 2 believable wrong answers for the given correct answer.
 * Uses answersData pool first (real exam terms) filtered by category,
 * then falls back to DENTAL_BANK terms.
 */
function generateDistractors(correctAnswer, useCategory = true) {
  const correctLower = correctAnswer.toLowerCase();

  // ── Step 1: find best category from DENTAL_BANK ────
  let bestCategory = null;
  let bestScore = 0;

  if (useCategory) {
    for (const [, cat] of Object.entries(DENTAL_BANK)) {
      const score = cat.keywords.filter(kw => correctLower.includes(kw)).length;
      if (score > bestScore) {
        bestScore = score;
        bestCategory = cat;
      }
    }
  }

  // ── Step 2: build candidate pool ──────────────────
  // Prefer real exam answers (answersData) filtered by category keywords
  let pool = [];

  if (bestCategory && bestScore > 0) {
    // Real exam answers matching the category
    pool = answersData
      .map(a => a.answer)
      .filter(a => {
        const al = a.toLowerCase();
        if (al === correctLower) return false;
        return bestCategory.keywords.some(kw => al.includes(kw));
      });

    // Also add DENTAL_BANK terms for more variety
    const bankTerms = bestCategory.terms.filter(t => t.toLowerCase() !== correctLower);
    pool = [...pool, ...bankTerms];
  }

  // Fallback: all real exam answers minus correct
  if (pool.length < 4) {
    pool = answersData
      .map(a => a.answer)
      .filter(a => a.toLowerCase() !== correctLower);
    pool = [...pool, ...ALL_TERMS.filter(t => t.toLowerCase() !== correctLower)];
  }

  // ── Step 3: deduplicate pool ───────────────────────
  const seen = new Set([correctLower]);
  const unique = [];
  for (const term of pool) {
    const tl = term.toLowerCase();
    if (!seen.has(tl)) {
      seen.add(tl);
      unique.push(term);
    }
  }

  // ── Step 4: shuffle and pick 2 ────────────────────
  shuffle(unique);
  return unique.slice(0, 2);
}

/* ──────────────────────────────────────────────────────
   3. HELPERS
────────────────────────────────────────────────────── */

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function pad4(n) {
  return String(n).padStart(4, '0');
}

function getImagePath(pageNum) {
  const padded = pad4(pageNum);
  // Supports both Arabic filename and English fallback
  return `slides/مقرر امتحان عملي خواص مواد_page-${padded}.jpg`;
}

function getHighScore() {
  try { return parseInt(localStorage.getItem('dentalQuiz_highScore') || '0', 10); }
  catch { return 0; }
}

function setHighScore(score) {
  try { localStorage.setItem('dentalQuiz_highScore', String(score)); }
  catch {}
}

function getGrade(pct) {
  if (pct >= 90) return { text: 'Excellent — A', cls: 'a', emoji: '🏆' };
  if (pct >= 75) return { text: 'Good — B',      cls: 'b', emoji: '🎉' };
  if (pct >= 60) return { text: 'Pass — C',       cls: 'c', emoji: '👍' };
  return              { text: 'Needs work — D',   cls: 'd', emoji: '📚' };
}

/* ──────────────────────────────────────────────────────
   4. DOM ELEMENTS
────────────────────────────────────────────────────── */
const $id = id => document.getElementById(id);

const screens = {
  start:  $id('startScreen'),
  quiz:   $id('quizScreen'),
  result: $id('resultScreen'),
};

const dom = {
  // Start
  totalSlides:    $id('totalSlides'),
  highScoreDisp:  $id('highScoreDisplay'),
  shuffleCheck:   $id('shuffleCheck'),
  categoryCheck:  $id('categoryCheck'),
  startBtn:       $id('startBtn'),

  // Quiz
  exitBtn:        $id('exitBtn'),
  progressFill:   $id('progressFill'),
  progressLabel:  $id('progressLabel'),
  scoreDisplay:   $id('scoreDisplay'),
  scoreChip:      $id('scoreChip'),
  slideTag:       $id('slideTag'),
  slideImg:       $id('slideImg'),
  slideLoader:    $id('slideLoader'),
  slideError:     $id('slideError'),
  slideErrorText: $id('slideErrorText'),
  choicesGrid:    $id('choicesGrid'),
  feedback:       $id('feedback'),
  feedbackInner:  $id('feedbackInner'),
  nextBtn:        $id('nextBtn'),
  nextBtnLabel:   $id('nextBtnLabel'),
  quizCard:       $id('quizCard'),

  // Result
  resultEmoji:    $id('resultEmoji'),
  resultScore:    $id('resultScore'),
  resultPct:      $id('resultPct'),
  gradeBadge:     $id('gradeBadge'),
  gradeText:      $id('gradeText'),
  rbCorrect:      $id('rb-correct'),
  rbWrong:        $id('rb-wrong'),
  rbBest:         $id('rb-best'),
  restartBtn:     $id('restartBtn'),
  homeBtn:        $id('homeBtn'),
};

/* ──────────────────────────────────────────────────────
   5. QUIZ STATE
────────────────────────────────────────────────────── */
let state = {
  questions:    [],   // shuffled list of {page, answer}
  current:      0,    // index
  score:        0,
  answered:     false,
  totalSlides:  0,
  useCategory:  true,
};

/* ──────────────────────────────────────────────────────
   6. SCREEN TRANSITIONS
────────────────────────────────────────────────────── */
function showScreen(name) {
  Object.entries(screens).forEach(([key, el]) => {
    el.classList.remove('active');
    if (key === name) {
      el.classList.add('active');
    }
  });
}

/* ──────────────────────────────────────────────────────
   7. INIT
────────────────────────────────────────────────────── */
function init() {
  // Populate high score
  const hs = getHighScore();
  dom.highScoreDisp.textContent = hs > 0 ? `${hs}/${answersData.length}` : '—';
  dom.totalSlides.textContent   = answersData.length;
}

/* ──────────────────────────────────────────────────────
   8. START QUIZ
────────────────────────────────────────────────────── */
function startQuiz() {
  const doShuffle   = dom.shuffleCheck.checked;
  state.useCategory = dom.categoryCheck.checked;

  // Build questions list
  state.questions = [...answersData];
  if (doShuffle) shuffle(state.questions);

  state.current  = 0;
  state.score    = 0;
  state.answered = false;
  state.totalSlides = state.questions.length;

  dom.scoreDisplay.textContent = '0';
  showScreen('quiz');
  loadQuestion();
}

/* ──────────────────────────────────────────────────────
   9. LOAD QUESTION
────────────────────────────────────────────────────── */
function loadQuestion() {
  const q = state.questions[state.current];
  state.answered = false;

  // ── Update header ──────────────────────────────────
  const pct = Math.round((state.current / state.totalSlides) * 100);
  dom.progressFill.style.width = pct + '%';
  dom.progressLabel.textContent = `${state.current + 1} / ${state.totalSlides}`;

  // ── Update slide tag ───────────────────────────────
  dom.slideTag.textContent = `Slide #${q.page}`;

  // ── Load image ─────────────────────────────────────
  dom.slideLoader.classList.remove('hidden');
  dom.slideError.classList.add('hidden');
  dom.slideImg.classList.add('loading');
  dom.slideImg.src = '';

  const imgPath = getImagePath(q.page);
  const img = new Image();

  img.onload = () => {
    dom.slideImg.src = imgPath;
    dom.slideImg.classList.remove('loading');
    dom.slideLoader.classList.add('hidden');
  };

  img.onerror = () => {
    dom.slideLoader.classList.add('hidden');
    dom.slideError.classList.remove('hidden');
    dom.slideErrorText.textContent = `Image not found: page ${q.page}`;
  };

  img.src = imgPath;

  // ── Generate choices ───────────────────────────────
  const distractors = generateDistractors(q.answer, state.useCategory);
  const choices = [q.answer, ...distractors];
  shuffle(choices);

  // ── Render choices ─────────────────────────────────
  dom.choicesGrid.innerHTML = '';
  const labels = ['A', 'B', 'C'];

  choices.slice(0, 3).forEach((text, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.setAttribute('data-answer', text);
    btn.setAttribute('aria-label', `Option ${labels[i]}: ${text}`);

    btn.innerHTML = `
      <span class="choice-letter">${labels[i]}</span>
      <span class="choice-text">${text}</span>
      <svg class="choice-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    `;

    btn.addEventListener('click', () => handleAnswer(btn, text, q.answer));
    dom.choicesGrid.appendChild(btn);
  });

  // ── Reset feedback & next ──────────────────────────
  dom.feedback.classList.add('hidden');
  dom.feedback.className = 'feedback hidden';
  dom.feedbackInner.textContent = '';
  dom.nextBtn.disabled = true;

  const isLast = state.current === state.totalSlides - 1;
  dom.nextBtnLabel.textContent = isLast ? 'See Results' : 'Next question';

  // ── Animate card ───────────────────────────────────
  dom.quizCard.style.animation = 'none';
  void dom.quizCard.offsetHeight;
  dom.quizCard.style.animation = '';
}

/* ──────────────────────────────────────────────────────
   10. HANDLE ANSWER
────────────────────────────────────────────────────── */
function handleAnswer(clickedBtn, selectedAnswer, correctAnswer) {
  if (state.answered) return;
  state.answered = true;

  const isCorrect = selectedAnswer.toLowerCase() === correctAnswer.toLowerCase();
  const allBtns   = dom.choicesGrid.querySelectorAll('.choice-btn');

  // Update correct icon SVG to checkmark (already in HTML)
  // Update wrong icon SVG to X mark
  allBtns.forEach(btn => {
    btn.disabled = true;
    const btnAnswer = btn.getAttribute('data-answer');

    if (btnAnswer.toLowerCase() === correctAnswer.toLowerCase()) {
      btn.classList.add('correct');
    } else if (btn === clickedBtn && !isCorrect) {
      btn.classList.add('wrong');
      // Change icon to X
      const icon = btn.querySelector('.choice-icon');
      if (icon) {
        icon.innerHTML = '<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>';
      }
    } else {
      btn.classList.add('dimmed');
    }
  });

  // ── Score ──────────────────────────────────────────
  if (isCorrect) {
    state.score++;
    dom.scoreDisplay.textContent = state.score;
    dom.scoreChip.classList.remove('bump');
    void dom.scoreChip.offsetHeight;
    dom.scoreChip.classList.add('bump');
  }

  // ── Feedback ───────────────────────────────────────
  dom.feedback.classList.remove('hidden', 'correct-fb', 'wrong-fb');

  if (isCorrect) {
    dom.feedback.classList.add('correct-fb');
    dom.feedbackInner.innerHTML = `✅ Correct! <strong>${correctAnswer}</strong>`;
  } else {
    dom.feedback.classList.add('wrong-fb');
    dom.feedbackInner.innerHTML = `❌ Wrong. The answer is: <strong>${correctAnswer}</strong>`;
  }

  // ── Enable next ─────────────────────────────────────
  dom.nextBtn.disabled = false;
}

/* ──────────────────────────────────────────────────────
   11. NEXT QUESTION
────────────────────────────────────────────────────── */
function nextQuestion() {
  if (!state.answered) return;

  state.current++;

  if (state.current >= state.totalSlides) {
    showResults();
  } else {
    loadQuestion();
  }
}

/* ──────────────────────────────────────────────────────
   12. SHOW RESULTS
────────────────────────────────────────────────────── */
function showResults() {
  const total = state.totalSlides;
  const score = state.score;
  const pct   = Math.round((score / total) * 100);
  const grade = getGrade(pct);

  // High score
  const hs = getHighScore();
  if (score > hs) setHighScore(score);
  const newHs = Math.max(score, hs);

  dom.resultEmoji.textContent   = grade.emoji;
  dom.resultScore.textContent   = `${score} / ${total}`;
  dom.resultPct.textContent     = `${pct}%`;

  dom.gradeText.textContent = grade.text;
  dom.gradeBadge.className  = `grade-badge ${grade.cls}`;

  dom.rbCorrect.textContent = score;
  dom.rbWrong.textContent   = total - score;
  dom.rbBest.textContent    = newHs > 0 ? `${newHs}/${total}` : '—';

  showScreen('result');
}

/* ──────────────────────────────────────────────────────
   13. EVENT LISTENERS
────────────────────────────────────────────────────── */
dom.startBtn.addEventListener('click', startQuiz);

dom.nextBtn.addEventListener('click', nextQuestion);

dom.exitBtn.addEventListener('click', () => {
  if (confirm('Exit the quiz? Your progress will be lost.')) {
    showScreen('start');
    init();
  }
});

dom.restartBtn.addEventListener('click', startQuiz);

dom.homeBtn.addEventListener('click', () => {
  showScreen('start');
  init();
});

/* ── Keyboard shortcuts ───────────────────────────────
   1/2/3 → select choice
   Enter/N → next question
──────────────────────────────────────────────────── */
document.addEventListener('keydown', e => {
  // Only active on quiz screen
  if (!screens.quiz.classList.contains('active')) return;

  const key = e.key.toLowerCase();

  if (['1', '2', '3'].includes(key)) {
    const idx = parseInt(key, 10) - 1;
    const btns = dom.choicesGrid.querySelectorAll('.choice-btn');
    if (btns[idx] && !btns[idx].disabled) {
      btns[idx].click();
    }
    return;
  }

  if (key === 'enter' || key === 'n') {
    if (!dom.nextBtn.disabled) nextQuestion();
    return;
  }
});

/* ──────────────────────────────────────────────────────
   14. INITIALISE ON LOAD
────────────────────────────────────────────────────── */
init();
</script>
